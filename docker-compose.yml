services:
  ################################################################################
  # Kafka Setup - KRaft Mode
  ################################################################################
  # KRaft architecture with 3 Kafka brokers and 1 controller
  kafka-1:
    image: apache/kafka:3.8.0
    container_name: kafka-1
    ports:
      - "9092:9092"   # INTERNAL (Docker)
      - "19092:19092" # EXTERNAL (Host)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 4@kafka-controller:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    networks:
      - kafka-net
    volumes:
      - kafka_1_data:/var/lib/kafka/data

  kafka-2:
    image: apache/kafka:3.8.0
    container_name: kafka-2
    ports:
      - "9093:9092"   # INTERNAL (Docker)
      - "29092:29092" # EXTERNAL (Host)
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 4@kafka-controller:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    networks:
      - kafka-net
    volumes:
      - kafka_2_data:/var/lib/kafka/data

  kafka-3:
    image: apache/kafka:3.8.0
    container_name: kafka-3
    ports:
      - "9094:9092"   # INTERNAL (Docker)
      - "39092:39092" # EXTERNAL (Host)
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:39092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:9092,EXTERNAL://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 4@kafka-controller:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    networks:
      - kafka-net
    volumes:
      - kafka_3_data:/var/lib/kafka/data

  kafka-controller:
    image: apache/kafka:3.8.0
    container_name: kafka-controller
    ports:
      - "19093:9093"
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 4@kafka-controller:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    networks:
      - kafka-net
    volumes:
      - kafka_controller_data:/var/lib/kafka/data

  kafka-setup:
    # Automatically create topics after Kafka brokers are up
    image: apache/kafka:3.8.0
    networks:
      - kafka-net
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    command: >
      sh -c "
      echo 'Waiting for Kafka...' &&
      sleep 30 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic transactions --bootstrap-server kafka-1:9092 --partitions 3 --replication-factor 3 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic fraud-alerts --bootstrap-server kafka-1:9092 --partitions 3 --replication-factor 3 &&
      echo 'Topic created'
      "

  ################################################################################
  # Application Producer
  ################################################################################
  app-producer-bank-a:
    build:
      context: .
      dockerfile: producers/Dockerfile
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - TOPIC=transactions
      - BANK_ID=BANK_A
      - USER_ID_MIN=1000
      - USER_ID_MAX=4999
      - TPS=50  # transactions per second
    networks:
      - kafka-net
    depends_on:
      kafka-setup:
        condition: service_completed_successfully

  app-producer-bank-b:
    build:
      context: .
      dockerfile: producers/Dockerfile
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - TOPIC=transactions
      - BANK_ID=BANK_B
      - USER_ID_MIN=5000
      - USER_ID_MAX=9999
      - TPS=30
    networks:
      - kafka-net
    depends_on:
      kafka-setup:
        condition: service_completed_successfully

  ################################################################################
  # Flink setup
  ################################################################################

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: flink-jobmanager
    ports:
      - "8081:8081"  # Flink Web UI
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
    networks:
      - kafka-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    depends_on:
      - flink-jobmanager
    command: taskmanager
    deploy:
      replicas: 2
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 6
        parallelism.default: 2
    networks:
      - kafka-net

  # Job Submitter
  flink-job-submitter:
    build:
      context: .
      dockerfile: flink/Dockerfile
    networks:
      - kafka-net
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    command: >
      sh -c "
      echo 'Waiting for Flink to be ready...' &&
      sleep 60 &&
      echo 'Submitting Flink SQL job...' &&
      /opt/flink/bin/sql-client.sh embedded -Drest.address=flink-jobmanager -Drest.port=8081 -f /opt/flink/jobs/flink_sql_job.sql &&
      echo 'Flink SQL job submitted successfully!' &&
      tail -f /dev/null
      "
  ################################################################################
  # Streamlit Dashboard
  ################################################################################
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=transactions_db
      - POSTGRES_USER=transactions_user
      - POSTGRES_PASSWORD=transactions123
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks:
      - kafka-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  ################################################################################
  # PostgreSQL Database
  ################################################################################
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: transactions_user
      POSTGRES_PASSWORD: transactions123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions_user -d transactions_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  kafka_controller_data:
  postgres_data:

networks:
  kafka-net:
    driver: bridge